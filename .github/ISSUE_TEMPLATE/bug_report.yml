name: Bug report
description: Report a bug in the simulator, runner, or tooling
labels: [bug]
body:
  - type: input
    id: component
    attributes:
      label: Affected component
      description: Which part of the system is affected?
      placeholder: "e.g. run_scenario.py, hub_optimus_simulator.py, CI workflow"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened, and what did you expect instead?
      placeholder: |
        **What happened:**
        ...

        **What I expected:**
        ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the bug.
      placeholder: |
        1. Run `python run_scenario.py ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, relevant details.
      placeholder: |
        - OS: Windows 11 / Ubuntu 24.04
        - Python: 3.12.x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste any error messages or logs.
      render: text
    validations:
      required: false
