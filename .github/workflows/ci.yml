name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check docs encoding (mojibake guard)
        run: python tools/check_mojibake.py v1_core docs README.md CONTRIBUTING.md

      - name: Narrative consistency check
        run: |
          python tools/check_narrative_consistency.py \
            --input datasets/ai_risk_narratives/seed_claims.json \
            --taxonomy datasets/ai_risk_narratives/taxonomy.json \
            --report out/narrative_consistency.json \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Run tests
        run: python -m pytest -q

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run benchmark pack v0 (non-blocking)
        run: python benchmarks/run_benchmarks.py --summary-file "$GITHUB_STEP_SUMMARY"
