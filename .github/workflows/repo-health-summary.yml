name: Repo Health Summary

on:
  schedule:
    - cron: "0 8 * * 1"   # weekly Monday 08:00 UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: read
  issues: write

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Gather and post health summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PRS=$(gh pr list --state open --json number --jq 'length')
          ISSUES=$(gh issue list --state open --json number --jq 'length')
          LAST5=$(gh run list --limit 5 --json conclusion --jq '.[].conclusion' | tr '\n' ' ')
          FAILURES=$(gh run list --limit 10 --json conclusion --jq '[.[] | select(.conclusion=="failure")] | length')
          LAST_COMMIT=$(git log -1 --pretty=format:"%h %s")
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Anomaly detection
          ALERTS=""
          if [ "$PRS" -gt 10 ]; then
            ALERTS="${ALERTS}
> **Warning:** $PRS open PRs detected — check for bot loop or stale PRs."
          fi
          if [ "$FAILURES" -gt 3 ]; then
            ALERTS="${ALERTS}
> **Warning:** $FAILURES CI failures in last 10 runs — investigate pipeline."
          fi

          if [ -z "$ALERTS" ]; then
            STATUS="All clear"
          else
            STATUS="Anomalies detected"
          fi

          BODY="### Weekly Health Snapshot - ${DATE}

| Metric | Value |
|---|---|
| Open PRs | ${PRS} |
| Open Issues | ${ISSUES} |
| CI (last 5) | ${LAST5} |
| CI failures (last 10) | ${FAILURES} |
| Latest commit | \`${LAST_COMMIT}\` |
| Status | **${STATUS}** |
${ALERTS}

---
*Generated by repo-health-summary workflow*"

          gh issue comment 93 --body "$BODY"
